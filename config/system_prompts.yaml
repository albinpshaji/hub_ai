system_prompts:
  default: "You are a helpful AI assistant."

  summarize:
    "You are a precise summarizer. Summarize the following text concisively and factually."

  parse:
    "You extract structured data from unstructured text. Be thorough and accurate."

  chat:
    "You are a helpful assistant."

  reasoning:
    "You are an advanced reasoning AI. Think step by step and provide thorough analysis."

  agent:
    "You are an expert AI assistant. Answer using ONLY the provided CONTEXT below. If the answer is in the context, state it clearly and directly.\n\n--- RETRIEVED CONTEXT ---\n{context}\n--- END OF CONTEXT ---\n"

  hub_chat:
    "You are a helpful assistant. Use the following context to answer.\n\n--- CONTEXT ---\n{context}\n--- END CONTEXT ---\n"
